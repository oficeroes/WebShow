<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>澳門生物多樣性熱點圖 · 2025 / 2026</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      :root {
        --panel-bg: rgba(255, 255, 255, 0.94);
        --accent: #1f8a70;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      #map {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: #aadaff;
      }

      .panel {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 1000;
        width: 268px;
        background: var(--panel-bg);
        border-radius: 12px;
        padding: 14px 16px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(4px);
        max-height: calc(100% - 28px);
        overflow-y: auto;
        transition: all 0.3s ease;
      }
      .panel.collapsed {
        width: 48px;
        height: 48px;
        padding: 0;
        border-radius: 50%;
        overflow: hidden;
        cursor: pointer;
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 9998;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        pointer-events: auto;
      }
      .panel.collapsed > *:not(.panel-header) {
        display: none;
      }
      .panel.collapsed .panel-header {
        padding: 0;
        margin: 0;
        border: none;
      }
      .panel.collapsed .panel-header h1 {
        font-size: 18px;
        line-height: 28px;
      }
      .panel.collapsed .panel-header .sub,
      .panel.collapsed .panel-header .panel-close {
        display: none;
      }

      .panel-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .panel-header h1 {
        font-size: 17px;
        margin: 0 0 2px;
        color: #13503f;
        cursor: pointer;
      }
      .panel-header .sub {
        font-size: 12px;
        color: #666;
      }
      .panel-header .left {
        flex: 1;
      }

      .panel-close {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #cdd8d4;
        background: #fff;
        color: #889;
        font-size: 17px;
        line-height: 26px;
        text-align: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }
      .panel-close:hover {
        background: #f44336;
        color: #fff;
        border-color: #f44336;
      }

      /* 面板隱藏時出現的浮動按鈕 */
      .panel-show-btn {
        display: none;
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 9999;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        border: 2px solid #fff;
        font-size: 24px;
        line-height: 44px;
        text-align: center;
        cursor: pointer;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.25);
        pointer-events: auto;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      .panel-show-btn.visible {
        display: block;
      }

      /* 手機端預設摺疊面板 */
      @media (max-width: 600px) {
        .panel {
          top: 8px;
          left: 8px;
          width: calc(100% - 16px);
          max-height: 42vh;
          border-radius: 10px;
          padding: 10px 12px;
          font-size: 13px;
        }
        .panel.collapsed {
          width: 40px;
          height: 40px;
          max-height: none;
          padding: 6px;
          left: 8px;
          top: 8px;
        }
        .panel-show-btn {
          top: 8px;
          left: 8px;
          width: 40px;
          height: 40px;
          font-size: 20px;
          line-height: 40px;
        }
        .legend {
          bottom: 8px;
          right: 8px;
          font-size: 10px;
          padding: 6px 8px;
        }
        .legend .bar {
          width: 120px;
          height: 8px;
        }
      }

      .year-toggle,
      .status-toggle {
        display: flex;
        background: #e7efec;
        border-radius: 9px;
        padding: 4px;
        margin-bottom: 10px;
      }
      .year-toggle button,
      .status-toggle button {
        flex: 1;
        border: 0;
        background: transparent;
        padding: 8px 0;
        border-radius: 7px;
        font-size: 14px;
        font-weight: 600;
        color: #557;
        cursor: pointer;
        transition: 0.18s;
      }
      .year-toggle button.active,
      .status-toggle button.active {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 2px 6px rgba(31, 138, 112, 0.4);
      }
      .status-toggle button.active[data-status="abnormal"] {
        background: #c23b3b;
        box-shadow: 0 2px 6px rgba(194, 59, 59, 0.35);
      }
      .view-link {
        display: block;
        margin: 0 0 12px;
        padding: 7px 9px;
        border: 1px solid #cdd8d4;
        border-radius: 7px;
        color: #13503f;
        text-decoration: none;
        font-size: 12px;
        text-align: center;
        background: #fff;
      }
      .view-link:hover {
        background: #f3f7f5;
      }

      .stat {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 13px;
        color: #444;
        margin-bottom: 10px;
      }
      .stat b {
        font-size: 22px;
        color: var(--accent);
      }

      .sec-title {
        font-size: 12px;
        font-weight: 700;
        color: #888;
        letter-spacing: 0.5px;
        margin: 6px 0 8px;
        text-transform: uppercase;
      }
      .cat-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .cat-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 6px;
        border-radius: 7px;
        cursor: pointer;
        font-size: 13px;
        user-select: none;
        transition: background 0.15s;
      }
      .cat-item:hover {
        background: #eef4f2;
      }
      .cat-item.off {
        opacity: 0.38;
      }
      .swatch {
        width: 13px;
        height: 13px;
        border-radius: 3px;
        flex: none;
      }
      .cat-name {
        flex: 1;
        color: #333;
      }
      .cat-count {
        color: #888;
        font-variant-numeric: tabular-nums;
        font-size: 12px;
      }

      .cat-actions {
        display: flex;
        gap: 8px;
        margin: 4px 0 10px;
      }
      .cat-actions button {
        flex: 1;
        border: 1px solid #cdd8d4;
        background: #fff;
        border-radius: 6px;
        padding: 5px 0;
        font-size: 12px;
        color: #557;
        cursor: pointer;
      }
      .cat-actions button:hover {
        background: #f3f7f5;
      }

      .hint {
        font-size: 11px;
        color: #9aa;
        line-height: 1.5;
        margin-top: 10px;
      }

      .legend {
        position: absolute;
        bottom: 16px;
        right: 16px;
        z-index: 1000;
        background: var(--panel-bg);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 12px;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
      }
      .legend .bar {
        height: 10px;
        width: 160px;
        border-radius: 5px;
        margin: 6px 0 3px;
        background: linear-gradient(
          90deg,
          #2b6cff,
          #22d3a6,
          #ffe14d,
          #ff8c1a,
          #ff2d2d
        );
      }
      .legend .ends {
        display: flex;
        justify-content: space-between;
        color: #666;
      }
      .loading {
        position: absolute;
        inset: 0;
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.85);
        font-size: 15px;
        color: #557;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <!-- 面板關閉後出現的浮動打開按鈕 -->
    <button class="panel-show-btn" id="panelShowBtn" title="打開控制面板">
      📊
    </button>

    <div class="panel" id="mainPanel">
      <div class="panel-header">
        <div class="left" title="點擊收起面板">
          <h1>🦜 澳門生物多樣性熱點圖</h1>
          <div class="sub">基於 iNaturalist 觀測記錄 · 校際團隊挑戰賽</div>
        </div>
        <button class="panel-close" title="關閉面板">✕</button>
      </div>

      <div class="year-toggle" id="yearToggle">
        <button data-year="2025">2025 年</button>
        <button data-year="2026" class="active">2026 年</button>
      </div>

      <div class="status-toggle" id="statusToggle">
        <button data-status="clean" class="active">正確數據</button>
        <button data-status="abnormal">異常數據</button>
      </div>

      <a class="view-link" href="澳门生物多样性点位详情图.html"
        >打開點位詳情圖</a
      >

      <div class="stat">
        <span>當前可見記錄</span><b id="visibleCount">—</b>
      </div>

      <div class="sec-title">物種類別（點擊篩選）</div>
      <div class="cat-actions">
        <button id="selAll">全選</button>
        <button id="selNone">全不選</button>
      </div>
      <ul class="cat-list" id="catList"></ul>

      <div class="hint">
        熱點顏色越偏紅，表示該區域觀測密度越高。切換年份可對比不同年度的分佈變化。
      </div>
    </div>

    <div class="legend">
      <div>觀測密度</div>
      <div class="bar"></div>
      <div class="ends"><span>低</span><span>高</span></div>
    </div>

    <div class="loading" id="loading">正在載入數據…</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="热点图数据.js"></script>
    <script>
      (function () {
        const DATA = window.HEATMAP_DATA;
        const CATS = DATA.categories;
        // 每個類別一個色塊（用於圖例小方塊）
        const PALETTE = [
          "#2e7d32",
          "#1565c0",
          "#ef6c00",
          "#6a1b9a",
          "#00838f",
          "#5d4037",
          "#c2185b",
          "#827717",
          "#0277bd",
          "#ad1457",
          "#37474f",
          "#9e9d24",
          "#777",
        ];

        const map = L.map("map", { zoomControl: true }).setView(
          [22.15, 113.55],
          12,
        );
        L.tileLayer(
          "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
          {
            attribution: "© OpenStreetMap, © CARTO",
            maxZoom: 19,
            subdomains: "abcd",
          },
        ).addTo(map);

        let heat = L.heatLayer([], {
          radius: 18,
          blur: 22,
          maxZoom: 17,
          minOpacity: 0.25,
          gradient: {
            0.2: "#2b6cff",
            0.4: "#22d3a6",
            0.6: "#ffe14d",
            0.8: "#ff8c1a",
            1.0: "#ff2d2d",
          },
        }).addTo(map);

        let currentYear = "2026";
        let currentStatus = "clean";
        const active = new Set(CATS.map((c) => c.index)); // 預設全部類別開啟

        // ---- 面板摺疊/展開 ----
        const mainPanel = document.getElementById("mainPanel");
        const showBtn = document.getElementById("panelShowBtn");

        function collapsePanel() {
          mainPanel.classList.add("collapsed");
          showBtn.classList.add("visible");
          setTimeout(function () {
            map.invalidateSize();
          }, 350);
        }
        function expandPanel() {
          mainPanel.classList.remove("collapsed");
          showBtn.classList.remove("visible");
          setTimeout(function () {
            map.invalidateSize();
          }, 350);
        }
        function togglePanel() {
          if (mainPanel.classList.contains("collapsed")) expandPanel();
          else collapsePanel();
        }

        // 按鈕 + 摺疊圖標都用 touchstart（手機端即時響應）
        function bindTap(el, fn) {
          el.addEventListener(
            "touchstart",
            function (e) {
              e.preventDefault();
              fn();
            },
            { passive: false },
          );
          el.addEventListener("click", function (e) {
            e.stopPropagation();
            fn();
          });
        }
        bindTap(showBtn, expandPanel);
        bindTap(mainPanel.querySelector(".panel-header .left"), togglePanel);
        bindTap(mainPanel.querySelector(".panel-close"), collapsePanel);
        // 摺疊後的圓形圖標點它也能展開
        mainPanel.addEventListener("click", function (e) {
          if (mainPanel.classList.contains("collapsed")) expandPanel();
        });

        // 手機端自動摺疊
        if (window.innerWidth < 600) collapsePanel();

        // 點擊地圖空白區收起面板（手機端），但不干擾按鈕
        map.on("click", function (e) {
          if (
            window.innerWidth < 600 &&
            !mainPanel.classList.contains("collapsed")
          ) {
            collapsePanel();
          }
        });

        // ---- 構建類別篩選列表 ----
        const catList = document.getElementById("catList");
        function renderCatList() {
          const counts = DATA.years[currentYear][currentStatus].counts;
          catList.innerHTML = "";
          CATS.forEach((c) => {
            const n = counts[c.index] || 0;
            if (n === 0) return; // 該年無記錄的類別不顯示
            const li = document.createElement("li");
            li.className = "cat-item" + (active.has(c.index) ? "" : " off");
            li.innerHTML =
              `<span class="swatch" style="background:${PALETTE[c.index]}"></span>` +
              `<span class="cat-name">${c.label}</span>` +
              `<span class="cat-count">${n.toLocaleString()}</span>`;
            li.onclick = () => {
              if (active.has(c.index)) active.delete(c.index);
              else active.add(c.index);
              renderCatList();
              refresh();
            };
            catList.appendChild(li);
          });
        }

        // ---- 刷新熱力圖 ----
        function refresh() {
          const pts = DATA.years[currentYear][currentStatus].points;
          const out = [];
          for (let i = 0; i < pts.length; i++) {
            if (active.has(pts[i][2])) out.push([pts[i][0], pts[i][1], 0.6]);
          }
          heat.setLatLngs(out);
          document.getElementById("visibleCount").textContent =
            out.length.toLocaleString();
        }

        // ---- 年份切換 ----
        document.getElementById("yearToggle").addEventListener("click", (e) => {
          const btn = e.target.closest("button");
          if (!btn) return;
          currentYear = btn.dataset.year;
          [...e.currentTarget.children].forEach((b) =>
            b.classList.toggle("active", b === btn),
          );
          renderCatList();
          refresh();
        });

        // ---- 數據類型切換 ----
        document
          .getElementById("statusToggle")
          .addEventListener("click", (e) => {
            const btn = e.target.closest("button");
            if (!btn) return;
            currentStatus = btn.dataset.status;
            [...e.currentTarget.children].forEach((b) =>
              b.classList.toggle("active", b === btn),
            );
            renderCatList();
            refresh();
          });

        document.getElementById("selAll").onclick = () => {
          CATS.forEach((c) => active.add(c.index));
          renderCatList();
          refresh();
        };
        document.getElementById("selNone").onclick = () => {
          active.clear();
          renderCatList();
          refresh();
        };

        renderCatList();
        refresh();
        document.getElementById("loading").style.display = "none";
      })();
    </script>
  </body>
</html>
